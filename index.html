<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fútbol Stats ⚽</title>

<style>
body {
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  text-align: center;
}

.match {
  background: #111827;
  border-radius: 10px;
  padding: 15px;
  margin: 15px auto;
  width: 300px;
}

.live {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>⚽ Fútbol Stats</h1>

<button onclick="actualizar()">Actualizar 🔄</button>

<div id="matches"></div>

<script>

let matches = [
  {
    home: "Real Madrid",
    away: "Barcelona",
    date: "Hoy",
    score: "2 - 1",
    status: "EN VIVO"
  },
  {
    home: "Liverpool",
    away: "Chelsea",
    date: "Mañana",
    score: "0 - 0",
    status: "PRÓXIMO"
  }
];

function render() {
  const container = document.getElementById("matches");
  container.innerHTML = "";

  matches.forEach(match => {
    const div = document.createElement("div");
    div.classList.add("match");

    div.innerHTML = `
      <h2>${match.home} vs ${match.away}</h2>
      <h1>⚽ ${match.score}</h1>
      <p>📅 ${match.date}</p>
      <p class="${match.status === 'EN VIVO' ? 'live' : ''}">
        ${match.status}
      </p>
    `;

    container.appendChild(div);
  });
}

function actualizar() {
  matches.forEach(match => {
    if (match.status === "EN VIVO") {
      let golesLocal = Math.floor(Math.random() * 5);
      let golesVisitante = Math.floor(Math.random() * 5);
      match.score = golesLocal + " - " + golesVisitante;
    }
  });

  render();
}

render();

</script>

</body>
</html>
}
